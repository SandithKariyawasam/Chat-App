name: BravoCloud Deployment

on:
  push:
    branches:
      - main

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: bravocloud-chat-app
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd ./
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          # Also tag as latest
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Notify BravoCloud Success
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"projectId": "nNCrfzrBeqFjcP8tonRg", "deploymentId": "j6GnmJe7cbY2FHLeimL0", "status": "SUCCESS", "commitHash": "'"${GITHUB_SHA}"'"}' \
          http://localhost:4000/api/deployments/webhook

      - name: Notify BravoCloud Failure
        if: failure()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"projectId": "nNCrfzrBeqFjcP8tonRg", "deploymentId": "j6GnmJe7cbY2FHLeimL0", "status": "FAILED", "commitHash": "'"${GITHUB_SHA}"'"}' \
          http://localhost:4000/api/deployments/webhook
